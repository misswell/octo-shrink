<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>章小压 · OctoShrink</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Shared monochrome icon set, drawn on one 16pt grid for a native macOS feel. -->
  <svg class="icon-library" aria-hidden="true">
    <defs>
      <symbol id="icon-info" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 7.25v4M8 4.75v.01"/></symbol>
      <symbol id="icon-sun" viewBox="0 0 16 16"><circle cx="8" cy="8" r="2.75"/><path d="M8 1.5v1.25M8 13.25v1.25M1.5 8h1.25M13.25 8h1.25M3.4 3.4l.9.9M11.7 11.7l.9.9M12.6 3.4l-.9.9M4.3 11.7l-.9.9"/></symbol>
      <symbol id="icon-moon" viewBox="0 0 16 16"><path d="M13.65 9.8A6 6 0 0 1 6.2 2.35 6 6 0 1 0 13.65 9.8Z"/></symbol>
      <symbol id="icon-add-images" viewBox="0 0 16 16"><rect x="1.5" y="3" width="10" height="9.5" rx="1.6"/><path d="m3.4 10 2.1-2.25 1.65 1.6 1.35-1.2 3 2.85M4.75 5.75h.01M13.25 2v4M11.25 4h4"/></symbol>
      <symbol id="icon-folder-add" viewBox="0 0 16 16"><path d="M1.5 4.25A1.75 1.75 0 0 1 3.25 2.5h2.1l1.4 1.5h6A1.75 1.75 0 0 1 14.5 5.75v5.5A1.75 1.75 0 0 1 12.75 13h-9.5a1.75 1.75 0 0 1-1.75-1.75Z"/><path d="M8 6.25v4M6 8.25h4"/></symbol>
      <symbol id="icon-queue" viewBox="0 0 16 16"><circle cx="2.5" cy="4" r=".65" fill="currentColor" stroke="none"/><circle cx="2.5" cy="8" r=".65" fill="currentColor" stroke="none"/><circle cx="2.5" cy="12" r=".65" fill="currentColor" stroke="none"/><path d="M5 4h8.5M5 8h8.5M5 12h6"/></symbol>
      <symbol id="icon-compress" viewBox="0 0 16 16"><path d="M2.25 5V2.25H5M11 2.25h2.75V5M13.75 11v2.75H11M5 13.75H2.25V11"/><path d="m3 3 3.25 3.25M6.25 4.25v2h-2M13 3 9.75 6.25M11.75 6.25h-2v-2M13 13l-3.25-3.25M9.75 11.75v-2h2M3 13l3.25-3.25M4.25 9.75h2v2"/></symbol>
      <symbol id="icon-sliders" viewBox="0 0 16 16"><path d="M2 4h3M8 4h6M2 8h7M12 8h2M2 12h2M7 12h7"/><circle cx="6.5" cy="4" r="1.5"/><circle cx="10.5" cy="8" r="1.5"/><circle cx="5.5" cy="12" r="1.5"/></symbol>
      <symbol id="icon-results" viewBox="0 0 16 16"><circle cx="3" cy="4" r="1.5"/><path d="m2.35 4 .45.45.9-.95M6 4h8M2 8h12M2 12h9"/></symbol>
      <symbol id="icon-trash" viewBox="0 0 16 16"><path d="M2.5 4h11M6 1.75h4M4 4l.65 9.25a1 1 0 0 0 1 .93h4.7a1 1 0 0 0 1-.93L12 4M6.5 6.5v5M9.5 6.5v5"/></symbol>
      <symbol id="icon-restore" viewBox="0 0 16 16"><path d="M4.25 4.25A5.25 5.25 0 1 1 3 10.5"/><path d="M1.75 3.25v3.5h3.5"/></symbol>
      <symbol id="icon-export" viewBox="0 0 16 16"><path d="M8 10V1.75M5.25 4.5 8 1.75l2.75 2.75"/><path d="M4 6.75H2.75a1 1 0 0 0-1 1v5.5a1 1 0 0 0 1 1h10.5a1 1 0 0 0 1-1v-5.5a1 1 0 0 0-1-1H12"/></symbol>
      <symbol id="icon-save" viewBox="0 0 16 16"><path d="M8 1.75V10M5.25 7.25 8 10l2.75-2.75"/><path d="M2.25 11v2.25a1 1 0 0 0 1 1h9.5a1 1 0 0 0 1-1V11"/></symbol>
      <symbol id="icon-compare" viewBox="0 0 16 16"><rect x="1.5" y="2.25" width="13" height="11.5" rx="2"/><path d="M8 2.25v11.5M5 6.25 3.5 8 5 9.75M11 6.25 12.5 8 11 9.75"/></symbol>
      <symbol id="icon-finder" viewBox="0 0 16 16"><path d="M1.5 4.25A1.75 1.75 0 0 1 3.25 2.5h2.1l1.4 1.5h6A1.75 1.75 0 0 1 14.5 5.75v5.5A1.75 1.75 0 0 1 12.75 13h-9.5a1.75 1.75 0 0 1-1.75-1.75Z"/><circle cx="8.25" cy="8.25" r="2"/><path d="m9.7 9.7 1.55 1.55"/></symbol>
      <symbol id="icon-refresh" viewBox="0 0 16 16"><path d="M13.4 6A5.75 5.75 0 0 0 3.5 3.8L2 5.25M2.6 10A5.75 5.75 0 0 0 12.5 12.2l1.5-1.45"/><path d="M2 2.25v3h3M14 13.75v-3h-3"/></symbol>
      <symbol id="icon-fullscreen" viewBox="0 0 16 16"><path d="M2 6V2h4M10 2h4v4M14 10v4h-4M6 14H2v-4"/></symbol>
      <symbol id="icon-close" viewBox="0 0 16 16"><path d="m3.5 3.5 9 9M12.5 3.5l-9 9"/></symbol>
      <symbol id="icon-check" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="m5 8.1 2 2 4-4.25"/></symbol>
      <symbol id="icon-error" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="m5.75 5.75 4.5 4.5M10.25 5.75l-4.5 4.5"/></symbol>
      <symbol id="icon-warning" viewBox="0 0 16 16"><path d="M7.1 2.25 1.65 12a1.15 1.15 0 0 0 1 1.75h10.7a1.15 1.15 0 0 0 1-1.75L8.9 2.25a1.03 1.03 0 0 0-1.8 0Z"/><path d="M8 6v3.25M8 11.6v.01"/></symbol>
      <symbol id="icon-minus" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M5 8h6"/></symbol>
      <symbol id="icon-chevron-down" viewBox="0 0 16 16"><path d="m4 6 4 4 4-4"/></symbol>
      <symbol id="icon-split-grip" viewBox="0 0 16 16"><path d="m5.5 4-3 4 3 4M10.5 4l3 4-3 4"/></symbol>
    </defs>
  </svg>
  <!-- Title Bar -->
  <div class="titlebar">
    <div class="titlebar-traffic-spacer"></div>
    <div class="titlebar-drag" data-tauri-drag-region>
      <img src="octo-icon.png" class="titlebar-icon-img" alt="章小压">
      <span class="titlebar-text">OctoShrink</span>
    </div>
    <div class="titlebar-actions">
      <button class="tb-btn" onclick="toggleWindowControls()" title="关于">
        <svg class="symbol-icon"><use href="#icon-info"/></svg>
      </button>
      <button class="tb-btn" id="themeToggleBtn" onclick="cycleTheme()" title="切换主题">
        <svg class="symbol-icon theme-icon theme-icon-auto"><use href="#icon-sun"/></svg>
        <svg class="symbol-icon theme-icon theme-icon-light" style="display:none"><use href="#icon-sun"/></svg>
        <svg class="symbol-icon theme-icon theme-icon-dark" style="display:none"><use href="#icon-moon"/></svg>
      </button>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="container">
    <!-- Drop Zone -->
    <div class="dropzone" id="dropzone" onclick="selectFiles()">
      <div class="dropzone-content" id="dropzoneContent">
        <div class="dropzone-icon">
          <span class="dropzone-icon-disc"><svg class="symbol-icon symbol-icon-hero"><use href="#icon-add-images"/></svg></span>
        </div>
        <h2>拖拽图片或文件夹到此处</h2>
        <p>支持 PNG、JPG、GIF、WebP、BMP 格式 · 自动批量压缩</p>
        <div class="dropzone-buttons">
          <button class="btn btn-primary" onclick="event.stopPropagation(); selectFiles()">
            <svg class="symbol-icon"><use href="#icon-add-images"/></svg>
            选择文件
          </button>
          <button class="btn btn-secondary" onclick="event.stopPropagation(); selectFolder()">
            <svg class="symbol-icon"><use href="#icon-folder-add"/></svg>
            选择文件夹
          </button>
        </div>
      </div>
    </div>

    <!-- Queue Panel (unified: shows files waiting + compressing + done) -->
    <div class="queue-panel" id="queuePanel" style="display:none;">
      <div class="queue-header">
        <h3>
          <svg class="symbol-icon"><use href="#icon-queue"/></svg>
          文件队列
        </h3>
        <div class="queue-header-right">
          <span class="queue-summary" id="queueSummary">0 个文件</span>
          <span class="progress-summary" id="progressSummary" style="display:none;"></span>
          <button class="btn btn-small btn-ghost" onclick="clearAllFiles()" title="清空列表">清除全部</button>
        </div>
      </div>
      <div class="queue-stats" id="queueStats" style="display:none;">
        <div class="stat-item">
          <span class="stat-label">原始大小</span>
          <span class="stat-value stat-original" id="statOriginal">0B</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">压缩后</span>
          <span class="stat-value stat-compressed" id="statCompressed">0B</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">已节省</span>
          <span class="stat-value stat-savings" id="totalSavings">0B</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">压缩率</span>
          <span class="stat-value stat-rate" id="totalRate">0%</span>
        </div>
      </div>
      <div class="file-queue-list" id="fileQueueList"></div>
      <div class="queue-actions">
        <button class="btn btn-secondary" onclick="selectFiles()">
          <svg class="symbol-icon"><use href="#icon-add-images"/></svg>
          追加文件
        </button>
        <button class="btn btn-secondary" id="restoreAllBtn" onclick="restoreAllOriginals()" style="display:none;">
          <svg class="symbol-icon"><use href="#icon-restore"/></svg>
          恢复全部原图
        </button>
        <button class="btn btn-primary btn-full" id="startCompressBtn" onclick="startCompression()">
          <svg class="symbol-icon"><use href="#icon-compress"/></svg>
          开始压缩
        </button>
      </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel collapsed" id="settingsPanel" style="display:none;">
      <div class="settings-header" onclick="toggleSettings()">
        <h3>
          <svg class="symbol-icon"><use href="#icon-sliders"/></svg>
          压缩设置
        </h3>
        <svg class="symbol-icon settings-chevron"><use href="#icon-chevron-down"/></svg>
      </div>
      <div class="settings-body">
        <div class="settings-row">
          <label>压缩质量</label>
          <div class="quality-control">
            <input type="range" id="qualitySlider" min="10" max="100" value="75">
            <span id="qualityValue">75%</span>
          </div>
        </div>
        <div class="settings-row">
          <label>输出模式</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="outputMode" value="replace" checked>
              <span class="radio-custom"></span>
              覆盖原文件
            </label>
            <label class="radio-label">
              <input type="radio" name="outputMode" value="suffix">
              <span class="radio-custom"></span>
              添加 _compressed 后缀
            </label>
            <label class="radio-label">
              <input type="radio" name="outputMode" value="folder">
              <span class="radio-custom"></span>
              输出到指定文件夹
            </label>
          </div>
        </div>
        <div class="settings-row" id="outputDirRow" style="display:none;">
          <label>输出目录</label>
          <div class="dir-picker">
            <span id="outputDirDisplay" class="dir-display">未选择</span>
            <button class="btn btn-small" onclick="selectOutputDir()">浏览</button>
          </div>
        </div>
        <div class="settings-row">
          <label>智能模式</label>
          <div class="toggle-wrapper">
            <label class="toggle">
              <input type="checkbox" id="smartMode" checked>
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">自动选择最佳算法和参数</span>
          </div>
        </div>
        <div class="settings-row">
          <label>转换为 WebP</label>
          <div class="toggle-wrapper">
            <label class="toggle">
              <input type="checkbox" id="convertToWebp">
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">输出为 WebP 格式（更小体积）</span>
          </div>
        </div>
        <div class="settings-row">
          <label>输出格式</label>
          <div class="select-wrapper">
            <select id="outputFormat" class="settings-select">
              <option value="original">保持原格式</option>
              <option value="jpg">JPEG</option>
              <option value="png">PNG</option>
              <option value="webp">WebP</option>
              <option value="avif">AVIF</option>
              <option value="jxl">JPEG XL</option>
            </select>
          </div>
        </div>
        <div class="settings-row">
          <label>压缩引擎</label>
          <div class="select-wrapper">
            <select id="compressionBackend" class="settings-select">
              <option value="auto">自动选择（推荐）</option>
              <option value="sharp">现代引擎（推荐）</option>
              <option value="cli">CLI 工具</option>
            </select>
          </div>
        </div>
        <div class="settings-row">
          <label>压缩力度</label>
          <div class="select-wrapper">
            <select id="compressionEffort" class="settings-select">
              <option value="4">快速</option>
              <option value="6" selected>平衡（推荐）</option>
              <option value="7">高质量</option>
              <option value="9">极致压缩（慢）</option>
            </select>
          </div>
        </div>
      </div>

    </div>



    <!-- Results Panel -->
    <div class="results-panel" id="resultsPanel" style="display:none;">
      <div class="results-header">
        <h3>
          <svg class="symbol-icon"><use href="#icon-results"/></svg>
          压缩结果
        </h3>
        <div class="results-actions">
          <button class="btn btn-small" onclick="clearResults()">
            <svg class="symbol-icon symbol-icon-small"><use href="#icon-trash"/></svg>
            清空
          </button>
          <button class="btn btn-small" onclick="restoreAllOriginals()">
            <svg class="symbol-icon symbol-icon-small"><use href="#icon-restore"/></svg>
            恢复全部原图
          </button>
          <button class="btn btn-small btn-primary" onclick="exportAll()">
            <svg class="symbol-icon symbol-icon-small"><use href="#icon-export"/></svg>
            全部导出
          </button>
        </div>
      </div>
      <div class="results-summary" id="resultsSummary">
        <span>共压缩 <strong id="resultCount">0</strong> 个文件，节省 <strong id="resultTotalSavings">0B</strong></span>
      </div>
      <div class="results-list" id="resultsList"></div>
    </div>
  </div>

  <!-- Comparison Modal -->
  <div class="modal-backdrop" id="modalBackdrop" style="display:none;" onclick="closeCompare()"></div>
  <div class="compare-modal" id="comparePanel" style="display:none;">
    <div class="compare-modal-header">
     <h3>
        <svg class="symbol-icon"><use href="#icon-compare"/></svg>
        原图对比
     </h3>
     <div class="compare-toolbar-right">
       <div class="compare-zoom-control">
         <button class="zoom-step-btn" onclick="stepZoom(-0.25)" title="缩小">−</button>
         <input type="range" class="zoom-slider" id="zoomSlider" min="0.1" max="8" step="0.1" value="1">
         <button class="zoom-step-btn" onclick="stepZoom(0.25)" title="放大">+</button>
         <span class="zoom-value" id="zoomValue">100%</span>
         <button class="zoom-reset-btn" onclick="setCompareZoom(1)" title="重置缩放"><svg class="symbol-icon symbol-icon-small"><use href="#icon-refresh"/></svg></button>
       </div>
       <button class="btn btn-icon-close compare-fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="全屏">
         <svg class="symbol-icon"><use href="#icon-fullscreen"/></svg>
       </button>
       <button class="btn btn-icon-close" onclick="closeCompare()" title="关闭">
         <svg class="symbol-icon"><use href="#icon-close"/></svg>
       </button>
     </div>
   </div>
<div class="compare-modal-body" id="compareModalBody">
      <div class="compare-slider-outer" id="compareSliderOuter">
        <div class="compare-slider-container" id="compareSliderContainer">
          <div class="compare-img-wrapper" id="compareImgWrapper">
            <img id="compareCompressedImg" class="compare-img-base" alt="压缩后" draggable="false">
            <img id="compareOriginalImg" class="compare-img-overlay" alt="原图" draggable="false">
          </div>
        </div>
        <div class="compare-label label-left">原图</div>
        <div class="compare-label label-right">压缩后</div>
        <div class="compare-handle" id="compareHandle">
          <div class="compare-handle-line"></div>
          <div class="compare-handle-circle">
            <svg class="symbol-icon"><use href="#icon-split-grip"/></svg>
          </div>
        </div>
        <input type="range" class="compare-slider-bar" id="compareRange" min="0" max="100" value="50">
      </div>
<div class="compare-info">
   <div class="compare-info-item" style="width:100%;margin-bottom:4px;">
     <span class="compare-info-label">文件名</span>
 <span class="compare-info-value" id="compareFilename">-</span>
     </div>
     <div class="compare-info-row">
       <div class="compare-info-item">
         <span class="compare-info-label">原图大小</span>
         <span class="compare-info-value original" id="compareOriginalSize">-</span>
       </div>
       <div class="compare-info-item">
         <span class="compare-info-label">压缩后大小</span>
         <span class="compare-info-value compressed" id="compareCompressedSize">-</span>
       </div>
       <div class="compare-info-item">
         <span class="compare-info-label">节省</span>
         <span class="compare-info-value savings" id="compareSavings">-</span>
       </div>
       <div class="compare-info-item">
         <span class="compare-info-label">算法</span>
         <span class="compare-info-value" id="compareAlgorithm">-</span>
       </div>
     </div>
   </div>
   <div class="compare-recompress">
     <div class="recompress-row">
       <label>重新压缩质量</label>
       <input type="range" id="recompressQuality" min="10" max="100" value="75">
       <span id="recompressQualityValue">75%</span>
       <button class="btn btn-primary btn-recompress" id="recompressBtn" onclick="recompressWithQuality(document.getElementById('recompressQuality').value)">
         <svg class="symbol-icon symbol-icon-small"><use href="#icon-refresh"/></svg>
         重新压缩
       </button>
     </div>
   </div>
   <div class="compare-modal-footer">
     <button class="btn btn-secondary" onclick="restoreFromCompare()">
       <svg class="symbol-icon"><use href="#icon-restore"/></svg>
       恢复原图
     </button>
     <button class="btn btn-primary" onclick="closeCompare()">关闭</button>
   </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
