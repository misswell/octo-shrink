name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ═══ macOS 构建 ═══
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CLI tools
        run: |
          brew install pngquant oxipng mozjpeg gifsicle webp jpeg-xl libavif

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build
        run: cargo tauri build
        env:
          # 允许无签名构建
          CODE_SIGN_IDENTITY: ""

      - name: Bundle CLI tools
        run: bash scripts/package.sh

      - name: Create DMG
        run: |
          hdiutil create -volname "OctoShrink" \
            -srcfolder "src-tauri/target/release/bundle/macos/OctoShrink.app" \
            -ov -format UDZO \
            "src-tauri/target/release/bundle/OctoShrink_${{ github.ref_name }}_aarch64.dmg" || \
          hdiutil create -volname "OctoShrink" \
            -srcfolder "src-tauri/target/release/bundle/macos/OctoShrink.app" \
            -ov -format UDZO \
            "src-tauri/target/release/bundle/OctoShrink_universal.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/macos/OctoShrink.app
            src-tauri/target/release/bundle/*.dmg

  # ═══ Windows 构建 ═══
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CLI tools
        shell: pwsh
        run: |
          # 使用 scoop 安装 CLI 工具
          iex "& {$(irm get.scoop.sh)} -RunAsAdmin"
          scoop install pngquant oxipng gifsicle webp

          # mozjpeg (cjpeg)
          scoop bucket add extras
          scoop install jpegview

          # libavif (avifenc) - 从 GitHub 下载
          $avifUrl = "https://github.com/AOM-AV1/libavif/releases/download/v1.0.4/libavif-win64-v1.0.4.zip"
          Invoke-WebRequest -Uri $avifUrl -OutFile avif.zip
          Expand-Archive avif.zip -DestinationPath C:\tools\avif
          $env:PATH = "C:\tools\avif\bin;" + $env:PATH
          echo "C:\tools\avif\bin" >> $env:GITHUB_PATH

          # jpeg-xl (cjxl) - 从 GitHub 下载
          $jxlUrl = "https://github.com/libjxl/libjxl/releases/download/v0.10.2/jxl-x64-windows-0.10.2.zip"
          Invoke-WebRequest -Uri $jxlUrl -OutFile jxl.zip
          Expand-Archive jxl.zip -DestinationPath C:\tools\jxl
          echo "C:\tools\jxl\bin" >> $env:GITHUB_PATH

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  # ═══ Linux 构建 ═══
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install CLI tools
        run: |
          sudo apt-get install -y pngquant gifsicle webp libavif-bin
          # oxipng
          wget -q https://github.com/shssoichiro/oxipng/releases/download/v10.1.1/oxipng-10.1.1-x86_64-unknown-linux-musl.tar.gz
          tar xzf oxipng-*.tar.gz
          sudo mv oxipng-*/oxipng /usr/local/bin/
          # mozjpeg (cjpeg)
          wget -q https://github.com/mozilla/mozjpeg/releases/download/v4.1.5/mozjpeg-4.1.5-x86_64.tar.gz
          tar xzf mozjpeg-*.tar.gz
          sudo mv mozjpeg-*/cjpeg /usr/local/bin/
          # jpeg-xl (cjxl)
          wget -q https://github.com/libjxl/libjxl/releases/download/v0.10.2/jxl-linux-x64-static-v0.10.2.tar.gz
          tar xzf jxl-linux-*.tar.gz
          sudo mv jxl-*/cjxl /usr/local/bin/ || sudo find . -name cjxl -exec mv {} /usr/local/bin/ \;

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  # ═══ 发布 Release ═══
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # macOS
          find artifacts/macos-build -name "*.dmg" -exec cp {} release/ \;
          # Windows
          find artifacts/windows-build -name "*.exe" -exec cp {} release/ \;
          find artifacts/windows-build -name "*.msi" -exec cp {} release/ \;
          # Linux
          find artifacts/linux-build -name "*.deb" -exec cp {} release/ \;
          find artifacts/linux-build -name "*.AppImage" -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'v2.0.0' }}
          name: 章小压 · OctoShrink ${{ github.ref_name || 'v2.0.0' }}
          body: |
            ## 章小压 · OctoShrink

            免费开源的图片压缩神器，开箱即用。

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS (Apple Silicon) | `.dmg` | 内置全部压缩工具，开箱即用 |
            | Windows | `.exe` / `.msi` | 需系统安装 CLI 工具 |
            | Linux | `.deb` / `.AppImage` | 需系统安装 CLI 工具 |

            ### 功能
            - 🎯 支持 PNG/JPG/GIF/WebP/AVIF/JPEG XL 压缩
            - 🚀 3 线程并发批量处理
            - 🌙 暗黑模式（自动/亮色/暗黑）
            - 📊 压缩前后实时对比
            - ↩️ 一键恢复全部原图
            - 🔧 macOS 版内置 7 个压缩工具，无需安装依赖
          files: release/*
          draft: false
          prerelease: false
